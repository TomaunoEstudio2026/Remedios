<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff"/>
<title>Remedios</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f7f5;--surface:#ffffff;--card:#ffffff;--card2:#f0f4f1;
  --green:#18a86b;--green2:#128f59;--green-dim:#d4f0e4;--green-light:#e8f7f0;
  --text:#1a2e24;--text2:#5a7a68;--text3:#9ab8a8;
  --red:#e05252;--red-bg:#fdf0f0;--amber:#c89a0a;--amber-bg:#fdf8e8;
  --blue:#2a8fc4;--blue-bg:#e8f4fb;--purple:#7c5cbf;--purple-bg:#f0ebfb;
  --coral:#d4631a;--coral-bg:#fdf0e8;
  --border:#e4ece8;--shadow:0 1px 4px rgba(0,0,0,0.07);
  --radius:16px;--radius-sm:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
.hdr{background:var(--green);padding:16px 18px 14px;flex-shrink:0;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.hdr-title{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.hdr-sub{font-size:13px;color:rgba(255,255,255,0.8);margin-top:1px;}
.hdr-cfg{background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:18px;cursor:pointer;padding:6px 10px;line-height:1;border-radius:10px;}
.progress-bar{height:4px;background:rgba(255,255,255,0.25);border-radius:4px;overflow:hidden;margin-top:12px;}
.progress-fill{height:100%;background:#fff;border-radius:4px;transition:width 0.5s ease;}
.hdr-stats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.hdr-stat{font-size:12px;color:rgba(255,255,255,0.85);display:flex;align-items:center;gap:4px;}
.hdr-stat strong{color:#fff;font-size:13px;font-weight:600;}
.cuadre-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;margin-left:auto;}
.cuadre-ok{background:rgba(255,255,255,0.25);color:#fff;}
.cuadre-off{background:rgba(255,80,80,0.3);color:#fff;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;background:var(--bg);}
.content::-webkit-scrollbar{display:none;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;padding:13px 16px 13px 44px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:16px;outline:none;box-shadow:var(--shadow);}
.search-wrap input::placeholder{color:var(--text3);}
.search-wrap input:focus{border-color:var(--green);}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px;pointer-events:none;}

/* FILTERS */
.filters{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-size:13px;font-family:var(--font);cursor:pointer;white-space:nowrap;font-weight:500;}
.fbtn.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:600;}

/* SECTION LABEL */
.sec{font-size:11px;font-weight:700;letter-spacing:0.07em;color:var(--text3);text-transform:uppercase;margin:14px 0 8px;padding-left:2px;}

/* PATIENT CARD */
.pcard{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:13px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.pcard.pending::before{background:var(--border);}
.pcard.done::before{background:var(--green);}
.pcard.done{background:var(--green-light);border-color:#c0e8d4;}
.pcard:active{transform:scale(0.985);box-shadow:none;}
.bag-num{background:var(--green);color:#fff;font-size:14px;font-weight:700;font-family:var(--mono);padding:6px 10px;border-radius:10px;min-width:46px;text-align:center;flex-shrink:0;}
.pcard.done .bag-num{background:var(--green-dim);color:var(--green);}
.pcard-body{flex:1;min-width:0;}
.pcard-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard.done .pcard-name{text-decoration:line-through;color:var(--text2);}
.pcard-row{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap;}
.pcard-price{font-size:14px;color:var(--green);font-weight:600;font-family:var(--mono);}
.pcard-code{font-size:11px;color:var(--text3);font-family:var(--mono);background:var(--bg);padding:2px 7px;border-radius:5px;border:1px solid var(--border);}
.pcard-note{font-size:12px;color:var(--text2);font-style:italic;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-date{font-size:11px;color:var(--text3);margin-top:3px;}
.status-pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0;}
.sp-pending{background:var(--bg);color:var(--text3);border:1px solid var(--border);}
.sp-done{background:var(--green-light);color:var(--green);}
.sp-cash{background:var(--amber-bg);color:var(--amber);}
.sp-transfer{background:var(--blue-bg);color:var(--blue);}
.sp-pagado-esp{background:var(--blue-bg);color:var(--blue);border:1.5px solid #aad6ef;}
.sp-liberado{background:var(--purple-bg);color:var(--purple);}
.sp-stock-sold{background:var(--coral-bg);color:var(--coral);}
/* CARD estados nuevos */
.pcard.pagado-esperando::before{background:var(--blue);}
.pcard.pagado-esperando{background:var(--blue-bg);border-color:#aad6ef;}
.pcard.liberado::before{background:var(--purple);}
.pcard.liberado{background:var(--purple-bg);border-color:#c4b0e8;}
.pcard.liberado .pcard-name{color:var(--text2);}
.pcard.stock-sold::before{background:var(--coral);}
.pcard.stock-sold{background:var(--coral-bg);border-color:#e8c4a0;}
.pcard.stock-sold .pcard-name{text-decoration:line-through;color:var(--text3);}

/* TOTALS TAB */
.total-hero{background:var(--green);border-radius:var(--radius);padding:22px;text-align:center;margin-bottom:12px;}
.total-lbl{font-size:12px;color:rgba(255,255,255,0.8);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.total-big{font-size:38px;font-weight:700;color:#fff;font-family:var(--mono);letter-spacing:-1px;}
.total-exp{font-size:14px;color:rgba(255,255,255,0.8);margin-top:5px;}
.cuadre-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.2);}
.cuadre-lbl{font-size:13px;color:rgba(255,255,255,0.85);}
.cuadre-val{font-size:14px;font-weight:700;font-family:var(--mono);}
.cuadre-val.ok{color:#fff;}
.cuadre-val.off{color:#ffcccc;}
.channels-card{background:#fff;border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border:1.5px solid var(--border);}
.ch-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;font-weight:700;}
.ch-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.ch-row:last-child{border-bottom:none;}
.ch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ch-info{flex:1;}
.ch-name{font-size:14px;color:var(--text);font-weight:600;}
.ch-sub{font-size:12px;color:var(--text3);}
.ch-amt{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text);}
.pending-alert{background:var(--red-bg);border:1.5px solid #f0c8c8;border-radius:var(--radius);padding:16px;text-align:center;}
.pending-alert p{font-size:13px;color:var(--red);margin-bottom:4px;}
.pending-alert strong{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--red);}

/* CARGAR TAB */
.cargar-card{background:#fff;border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border:1.5px solid var(--border);}
.cargar-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;}
.ocr-zone{border:2px dashed #b0d8c4;border-radius:var(--radius-sm);padding:22px;text-align:center;cursor:pointer;background:var(--green-light);transition:border-color 0.2s;}
.ocr-zone:active{border-color:var(--green);}
.ocr-ico{font-size:30px;display:block;margin-bottom:8px;}
.ocr-text{font-size:14px;color:var(--text2);}
.ocr-tag{display:inline-block;background:var(--amber-bg);color:var(--amber);font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;margin-top:8px;border:1px solid #e8d890;}
.photo-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.chip{display:flex;align-items:center;gap:5px;background:var(--green-light);color:var(--green);font-size:12px;padding:5px 12px;border-radius:10px;font-weight:600;border:1px solid #c0e8d4;}
.divider-or{text-align:center;font-size:13px;color:var(--text3);margin:16px 0;}
.finput{width:100%;padding:13px 14px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;outline:none;margin-bottom:9px;}
.finput:focus{border-color:var(--green);}
.finput::placeholder{color:var(--text3);}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px;}
.ref-total-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.ref-label{font-size:13px;color:var(--text2);white-space:nowrap;font-weight:500;}
.btn-primary{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;letter-spacing:-0.2px;}
.btn-primary:active{background:var(--green2);}
.btn-secondary{width:100%;padding:13px;background:#fff;color:var(--text2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);cursor:pointer;margin-top:9px;font-weight:500;}
.btn-secondary:active{background:var(--bg);}
.btn-add{width:100%;padding:13px;background:var(--green-light);color:var(--green);border:1.5px solid #c0e8d4;border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);cursor:pointer;font-weight:600;}

/* HISTORIAL */
.hist-item{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;box-shadow:var(--shadow);border:1.5px solid var(--border);}
.hist-item:active{background:var(--bg);}
.hist-month{font-size:15px;font-weight:600;color:var(--text);}
.hist-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.hist-amt{text-align:right;}
.hist-total{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--green);}
.hist-pct{font-size:12px;color:var(--text3);}

/* NAV */
.nav{display:flex;background:#fff;border-top:1.5px solid var(--border);flex-shrink:0;padding-bottom:max(env(safe-area-inset-bottom), 4px);position:relative;z-index:10;}
.nbtn{flex:1;padding:11px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-family:var(--font);letter-spacing:0.03em;text-transform:uppercase;transition:color 0.2s;font-weight:500;}
.nbtn.on{color:var(--green);}
.nicon{font-size:20px;line-height:1;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 34px;width:100%;max-width:480px;border-top:1.5px solid var(--border);}
.modal-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 18px;}
.modal-name{font-size:19px;font-weight:700;color:var(--text);margin-bottom:2px;}
.modal-meta{display:flex;align-items:center;gap:9px;margin-bottom:4px;flex-wrap:wrap;}
.modal-price{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--green);}
.modal-code{font-size:12px;color:var(--text3);font-family:var(--mono);background:var(--bg);padding:3px 9px;border-radius:7px;border:1px solid var(--border);}
.modal-note-disp{font-size:13px;color:var(--text2);font-style:italic;margin-bottom:16px;min-height:14px;}
.already-done{background:var(--green-light);border:1.5px solid #c0e8d4;border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:16px;font-size:13px;color:var(--green);font-weight:500;}
.modal-lbl{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;font-weight:700;}
.opt-group{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.opt{flex:1;padding:12px 9px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:14px;font-family:var(--font);cursor:pointer;text-align:center;min-width:80px;font-weight:500;}
.opt.on{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:700;}
.mnote{width:100%;padding:12px 14px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:14px;outline:none;resize:none;margin-bottom:16px;}
.mnote:focus{border-color:var(--green);}
.mnote::placeholder{color:var(--text3);}

/* SETTINGS */
.settings-panel{background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 36px;width:100%;max-width:480px;border-top:1.5px solid var(--border);}
.sett-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:18px;}
.sett-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sett-lbl{font-size:14px;color:var(--text2);min-width:80px;font-weight:500;}
.acc-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}

/* LOADING */
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.load-logo{font-size:48px;}
.load-text{font-size:15px;color:var(--text2);font-family:var(--mono);}

/* TOAST */
#toast{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;padding:12px 22px;border-radius:22px;font-size:14px;z-index:300;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--text3);font-size:15px;}
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">💊</div>
  <div class="load-text">Cargando...</div>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-title" id="hdr-title">Remedios</div>
        <div class="hdr-sub" id="hdr-sub">Cargando datos...</div>
      </div>
      <button class="hdr-cfg" onclick="openSettings()">⚙</button>
    </div>
    <div class="hdr-stats" id="hdr-stats"></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="content" id="content"></div>

  <nav class="nav">
    <button class="nbtn on" id="nb-lista" onclick="setTab('lista')"><span class="nicon">📋</span>Lista</button>
    <button class="nbtn" id="nb-totales" onclick="setTab('totales')"><span class="nicon">💰</span>Totales</button>
    <button class="nbtn" id="nb-cargar" onclick="setTab('cargar')"><span class="nicon">➕</span>Cargar</button>
    <button class="nbtn" id="nb-historial" onclick="setTab('historial')"><span class="nicon">🗂</span>Historial</button>
  </nav>
</div>

<div id="modal-bg" class="modal-bg" style="display:none" onclick="handleModalBgClick(event)"></div>
<div id="toast">✓ Listo</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtTGAJ1X3yrvj-Dx-fsNmfe_Zw09yfrZo",
  authDomain: "medicamentos-8352a.firebaseapp.com",
  databaseURL: "https://medicamentos-8352a-default-rtdb.firebaseio.com",
  projectId: "medicamentos-8352a",
  storageBucket: "medicamentos-8352a.firebasestorage.app",
  messagingSenderId: "828746191058",
  appId: "1:828746191058:web:00f74a7502f7ce2121dd0b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  tab: 'lista',
  filter: 'todos',
  search: '',
  sortAlpha: false,
  patients: {},
  settings: {
    month: 'Junio 2025',
    refTotal: 0,
    accA: 'Bancaria Sur',
    accB: 'Galicia Personal',
    accC: 'Mercado Pago',
  },
  historial: {},
};

let modalPatient = null;
let payMode = null;
let transferDest = null;
let modalAction = null;

// ─── FIREBASE LISTENERS ──────────────────────────────────────────────────────
onValue(ref(db, 'settings'), snap => {
  if (snap.exists()) state.settings = { ...state.settings, ...snap.val() };
  renderHeader();
  renderContent();
});

onValue(ref(db, 'patients'), snap => {
  state.patients = snap.exists() ? snap.val() : {};
  renderHeader();
  renderContent();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
});

onValue(ref(db, 'historial'), snap => {
  state.historial = snap.exists() ? snap.val() : {};
});

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const peso = n => '$' + (n||0).toLocaleString('es-AR');
const now = () => { const d=new Date(); return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
const patients = () => Object.entries(state.patients).map(([k,v])=>({...v,_key:k}));
const filtered = () => {
  const s = state.search.toLowerCase();
  const results = patients().filter(p => {
    const ms = !s || p.name?.toLowerCase().includes(s) || String(p.bag||'').includes(s) || (p.code||'').toLowerCase().includes(s);
    const mf = state.filter==='todos'
      || (state.filter==='pendientes' && p.status==='pending')
      || (state.filter==='retirados' && p.status==='done')
      || (state.filter==='esperando' && p.status==='pagado-esperando')
      || (state.filter==='liberados' && (p.status==='liberado'||p.status==='stock-sold'));
    return ms && mf;
  });
  if (state.sortAlpha) {
    return results.sort((a,b)=>(a.name||'').localeCompare(b.name||'','es'));
  }
  return results.sort((a,b)=>(a.bag||0)-(b.bag||0));
};

window.toggleSort = () => { state.sortAlpha = !state.sortAlpha; renderLista(); };
const accName = k => ({ a:state.settings.accA, b:state.settings.accB, c:state.settings.accC }[k] || k);
const accColor = k => ({ a:'#5bc4f5', b:'#b388ff', c:'#ff8a65', cash:'#f5c842' }[k] || '#8ab89e');

// ─── TOTALS CALC ─────────────────────────────────────────────────────────────
const calcTotals = () => {
  const all = patients();
  // Cobrado = done + pagado-esperando + stock-sold
  const cobrados = all.filter(p=>p.status==='done'||p.status==='pagado-esperando'||p.status==='stock-sold');
  const totalCob = cobrados.reduce((s,p)=>s+(p.price||0),0);
  // Esperado = planilla original (todos excepto liberados)
  const noLibre = all.filter(p=>p.status!=='liberado');
  const totalEsp = noLibre.reduce((s,p)=>s+(p.origPrice||p.price||0),0);
  // Stock vendido
  const stockSold = all.filter(p=>p.status==='stock-sold');
  const totalStock = stockSold.reduce((s,p)=>s+(p.price||0),0);
  const stockN = stockSold.length;
  // Liberados sin vender
  const liberados = all.filter(p=>p.status==='liberado');
  const liberadosN = liberados.length;
  // Pagados esperando entrega
  const esperando = all.filter(p=>p.status==='pagado-esperando');
  const esperandoN = esperando.length;
  const esperandoAmt = esperando.reduce((s,p)=>s+(p.price||0),0);
  // Por canal (todos los que pagaron)
  const pagaron = all.filter(p=>['done','pagado-esperando','stock-sold'].includes(p.status));
  const cash = pagaron.filter(p=>p.payType==='cash').reduce((s,p)=>s+(p.price||0),0);
  const cashN = pagaron.filter(p=>p.payType==='cash').length;
  const ta = pagaron.filter(p=>p.dest==='a').reduce((s,p)=>s+(p.price||0),0);
  const taN = pagaron.filter(p=>p.dest==='a').length;
  const tb = pagaron.filter(p=>p.dest==='b').reduce((s,p)=>s+(p.price||0),0);
  const tbN = pagaron.filter(p=>p.dest==='b').length;
  const tc = pagaron.filter(p=>p.dest==='c').reduce((s,p)=>s+(p.price||0),0);
  const tcN = pagaron.filter(p=>p.dest==='c').length;
  const pend = all.filter(p=>p.status==='pending').length;
  const pendAmt = all.filter(p=>p.status==='pending').reduce((s,p)=>s+(p.price||0),0);
  const ref = state.settings.refTotal || 0;
  const diff = totalCob - ref;
  // Comisión
  const comPct = state.settings.comision || 0;
  const comAmt = comPct ? Math.round(totalCob * comPct / 100) : 0;
  const paraDoctor = totalCob - comAmt;
  return {totalEsp,totalCob,cash,cashN,ta,taN,tb,tbN,tc,tcN,pend,pendAmt,ref,diff,
          totalStock,stockN,liberadosN,esperandoN,esperandoAmt,comPct,comAmt,paraDoctor};
};

// ─── LISTA ───────────────────────────────────────────────────────────────────
function renderLista() {
  const list = filtered();

  const esperando = list.filter(p=>p.status==='pagado-esperando');
  const liberados = list.filter(p=>p.status==='liberado');

  if (!list.length) resultHtml = `<div class="empty">Sin resultados</div>`;
  if (pending.length) { resultHtml += `<div class="sec">⏳ Pendientes · ${pending.length}</div>`; pending.forEach(p=>{ resultHtml+=pCard(p); }); }
  if (esperando.length) { resultHtml += `<div class="sec" style="color:var(--blue)">💙 Pagado · esperando entrega · ${esperando.length}</div>`; esperando.forEach(p=>{ resultHtml+=pCard(p); }); }
  if (done.length) { resultHtml += `<div class="sec">✅ Retirados · ${done.length}</div>`; done.forEach(p=>{ resultHtml+=pCard(p); }); }
  if (liberados.length) { resultHtml += `<div class="sec" style="color:var(--purple)">🟣 Liberados en stock · ${liberados.length}</div>`; liberados.forEach(p=>{ resultHtml+=pCard(p); }); }
  if (stockSold.length) { resultHtml += `<div class="sec" style="color:var(--coral)">🟠 Stock vendido · ${stockSold.length}</div>`; stockSold.forEach(p=>{ resultHtml+=pCard(p); }); }

  document.getElementById('content').innerHTML = `
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input id="search-in" type="search" placeholder="Nombre, N° bolsita o código..."
        value="${state.search}"
        oninput="doSearch(this.value)"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:12px;">
      <div class="filters" style="flex:1;margin:0;">
        <button class="fbtn ${state.filter==='todos'?'on':''}" data-f="todos" onclick="setFilter('todos')">Todos</button>
        <button class="fbtn ${state.filter==='pendientes'?'on':''}" data-f="pendientes" onclick="setFilter('pendientes')">Pendientes</button>
        <button class="fbtn ${state.filter==='retirados'?'on':''}" data-f="retirados" onclick="setFilter('retirados')">Retirados</button>
        <button class="fbtn ${state.filter==='esperando'?'on':''}" data-f="esperando" onclick="setFilter('esperando')">💙 Pagado/Esp.</button>
        <button class="fbtn ${state.filter==='liberados'?'on':''}" data-f="liberados" onclick="setFilter('liberados')">🟣 Liberados</button>
      </div>
      <button onclick="toggleSort()" title="Cambiar orden"
        style="flex-shrink:0;padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;font-weight:600;">
        ${state.sortAlpha ? '🔤 A–Z' : '#️⃣ N°'}
      </button>
    </div>
    <div id="lista-results">${resultHtml}</div>`;

  // Restaurar foco si había búsqueda activa
  if (state.search) {
    const si = document.getElementById('search-in');
    if (si) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
  }
}

function pCard(p) {
  const st = p.status;
  const isDone = st==='done';
  const isEsp = st==='pagado-esperando';
  const isLib = st==='liberado';
  const isStockSold = st==='stock-sold';
  let statusHtml = '';
  if (isDone) {
    statusHtml = p.payType==='cash'
      ? `<span class="status-pill sp-cash">Efectivo</span>`
      : `<span class="status-pill sp-transfer">${accName(p.dest)}</span>`;
  } else if (isEsp) {
    statusHtml = `<span class="status-pill sp-pagado-esp">💙 Pagado/Esp.</span>`;
  } else if (isLib) {
    statusHtml = `<span class="status-pill sp-liberado">🟣 Liberado</span>`;
  } else if (isStockSold) {
    statusHtml = p.payType==='cash'
      ? `<span class="status-pill sp-stock-sold">🟠 Stock·Ef.</span>`
      : `<span class="status-pill sp-stock-sold">🟠 Stock·${accName(p.dest)}</span>`;
  } else {
    statusHtml = `<span class="status-pill sp-pending">Pendiente</span>`;
  }
  const cssClass = isDone?'done':isEsp?'pagado-esperando':isLib?'liberado':isStockSold?'stock-sold':'pending';
  const showPrice = isLib ? (p.stockPrice ? `<span class="pcard-price" style="color:var(--purple)">${peso(p.stockPrice)} <span style="font-size:10px;opacity:.6">stock</span></span>` : `<span class="pcard-price" style="color:var(--text3)">${peso(p.price)} <span style="font-size:10px">original</span></span>`)
    : `<span class="pcard-price">${peso(p.price)}</span>`;
  return `<div class="pcard ${cssClass}" onclick="openModal('${p._key}')">
    <div class="bag-num" style="${isLib?'background:var(--purple);color:#fff':isEsp?'background:#1a4060;color:#5bc4f5':isStockSold?'background:#5a2a1a;color:#ff8a65':''}">#${p.bag}</div>
    <div class="pcard-body">
      <div class="pcard-name">${p.name||''}</div>
      <div class="pcard-row">
        ${showPrice}
        ${p.code?`<span class="pcard-code">${p.code}</span>`:''}
      </div>
      ${p.note?`<div class="pcard-note">${p.note}</div>`:''}
      ${(isDone||isStockSold)&&p.date?`<div class="pcard-date">Entregado: ${p.date}</div>`:''}
      ${isEsp&&p.date?`<div class="pcard-date" style="color:#5bc4f5">Pagó: ${p.date}</div>`:''}
    </div>
    ${statusHtml}
  </div>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(key) {
  const p = state.patients[key];
  if (!p) return;
  modalPatient = { ...p, _key: key };
  payMode = p.payType || null;
  transferDest = p.dest || null;
  drawModal();
  document.getElementById('modal-bg').style.display = 'flex';
}

function drawModal() {
  const p = modalPatient;

  let statusBanner = '';

  if (isEsp) statusBanner = `<div class="already-done" style="background:rgba(20,50,80,0.6);border-color:rgba(91,196,245,0.3);color:#5bc4f5">💙 Pagado el ${p.date} · ${p.payType==='cash'?'Efectivo':accName(p.dest)} · Pendiente de entrega</div>`;
  if (isLib) statusBanner = `<div class="already-done" style="background:rgba(40,20,70,0.6);border-color:rgba(179,136,255,0.3);color:#b388ff">🟣 Liberado en stock · Precio stock: ${peso(p.stockPrice||p.price)}</div>`;
  if (isStockSold) statusBanner = `<div class="already-done" style="background:rgba(60,25,10,0.6);border-color:rgba(255,138,101,0.3);color:#ff8a65">🟠 Vendido como stock el ${p.date} · ${p.payType==='cash'?'Efectivo':accName(p.dest)}</div>`;

  mbg.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-meta">
      <span class="bag-num" style="font-size:14px">#${p.bag}</span>
      ${p.code?`<span class="modal-code">${p.code}</span>`:''}
    </div>

    <div class="modal-price" style="margin:4px 0 2px;">${peso(p.price)}</div>

      <div class="opt ${modalAction==='liberar'?'on':''}" onclick="selAction('liberar')" style="min-width:120px;color:var(--purple)">🟣 Liberar stock</div>
      <div class="opt ${modalAction==='stock-venta'?'on':''}" onclick="selAction('stock-venta')" style="min-width:120px;color:var(--coral)">🟠 Vender como stock</div>

      <div class="opt ${modalAction==='eliminar'?'on':''}" onclick="selAction('eliminar')" style="min-width:120px;color:var(--red)">🗑️ Dar de baja</div>
    </div>

    ${(modalAction==='retiro'||modalAction==='pagado-esp'||modalAction==='stock-venta'||modalAction==='entregar')?`
    <div class="modal-lbl">Forma de pago</div>

    <div class="modal-lbl">Destino</div>

      <div class="opt ${transferDest==='a'?'on':''}" onclick="selDest('a')">${state.settings.accA||'Cta A'}</div>
      <div class="opt ${transferDest==='b'?'on':''}" onclick="selDest('b')">${state.settings.accB||'Cta B'}</div>
      <div class="opt ${transferDest==='c'?'on':''}" onclick="selDest('c')">${state.settings.accC||'Cta C'}</div>
    </div>`:''}`:``}

    ${modalAction==='liberar'?`
    <div class="modal-lbl">Precio de stock (puede ser diferente)</div>
    <input class="finput" id="modal-stock-price" type="number" placeholder="Nuevo precio..." value="${p.stockPrice||p.price||''}"/>
    `:''}

    ${modalAction==='stock-venta'?`
    <div class="modal-lbl">Precio de venta stock</div>

      <div style="font-size:13px;color:var(--red);font-weight:600;margin-bottom:4px;">⚠️ ¿Dar de baja a este paciente?</div>
      <div style="font-size:12px;color:var(--red);opacity:.8;">Se eliminará de la planilla actual. Esta acción no se puede deshacer.</div>

    <textarea class="mnote" id="modal-note-in" rows="2" placeholder="Nota opcional...">${p.note||''}</textarea>
    ${modalAction?`<button class="btn-primary" onclick="confirmAccion()" style="margin-bottom:0;">Confirmar</button>`:''}
    <button class="btn-secondary" onclick="closeModal()" style="margin-top:8px;">Cancelar</button>
  </div>`;

window.confirmAccion = async () => {
  const noteEl = document.getElementById('modal-note-in');
  const note = noteEl ? noteEl.value : (modalPatient.note||'');
  const spEl = document.getElementById('modal-stock-price');
  const stockPrice = spEl ? parseInt(spEl.value)||0 : 0;

  if (modalAction === 'liberar') {
    await update(ref(db,'patients/'+modalPatient._key), {
      status:'liberado', stockPrice: stockPrice||modalPatient.price, note,
      payType:null, dest:null, date: now()
    });
    toast('🟣 Remedio liberado en stock');
    closeModal(); return;
  }

  if (modalAction === 'retiro' || modalAction === 'entregar') {
    if (!payMode) { toast('Seleccioná forma de pago'); return; }
    if (payMode==='transfer'&&!transferDest) { toast('Seleccioná destino'); return; }
    await update(ref(db,'patients/'+modalPatient._key), {
      status:'done', payType:payMode, dest:transferDest||null, date:now(), note
    });
    toast('✅ Retiro registrado');
    closeModal(); return;
  }

  if (modalAction === 'pagado-esp') {
    if (!payMode) { toast('Seleccioná forma de pago'); return; }
    if (payMode==='transfer'&&!transferDest) { toast('Seleccioná destino'); return; }
    await update(ref(db,'patients/'+modalPatient._key), {
      status:'pagado-esperando', payType:payMode, dest:transferDest||null, date:now(), note
    });
    toast('💙 Pago registrado — pendiente de entrega');
    closeModal(); return;
  }

  if (modalAction === 'stock-venta') {
    if (!payMode) { toast('Seleccioná forma de pago'); return; }
    if (payMode==='transfer'&&!transferDest) { toast('Seleccioná destino'); return; }
    const precio = stockPrice || modalPatient.stockPrice || modalPatient.price;
    await update(ref(db,'patients/'+modalPatient._key), {
      status:'stock-sold', price: precio, payType:payMode, dest:transferDest||null, date:now(), note
    });
    toast('🟠 Stock vendido registrado');
    closeModal(); return;
  }

  if (modalAction === 'eliminar') {
    await remove(ref(db, 'patients/'+modalPatient._key));
    toast('🗑️ Paciente dado de baja');
    closeModal(); return;
  }

  toast('Seleccioná una acción');
};

// ─── OCR ─────────────────────────────────────────────────────────────────────
const VISION_KEY = 'AIzaSyBtTGAJ1X3yrvj-Dx-fsNmfe_Zw09yfrZo';
let ocrPhotos = []; // { file, dataUrl }
let ocrResultados = []; // parsed rows

window.ocrAddPhotos = async (input) => {
  const files = Array.from(input.files);
  if (!files.length) return;
  for (const f of files) {
    const dataUrl = await fileToDataUrl(f);
    ocrPhotos.push({ file: f, dataUrl });
  }
  renderPhotoChips();
  document.getElementById('ocr-btn-process').style.display = 'block';
  input.value = '';
};

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error('Error leyendo archivo'));
    r.readAsDataURL(file);
  });
}

function renderPhotoChips() {
  const wrap = document.getElementById('photo-chips');
  if (!wrap) return;
  wrap.innerHTML = ocrPhotos.map((p, i) =>
    `<div class="chip">📷 Foto ${i+1} <span onclick="ocrRemovePhoto(${i})" style="cursor:pointer;margin-left:4px;opacity:0.6">✕</span></div>`
  ).join('');
}

window.ocrRemovePhoto = (i) => {
  ocrPhotos.splice(i, 1);
  renderPhotoChips();
  if (!ocrPhotos.length) document.getElementById('ocr-btn-process').style.display = 'none';
};

window.ocrProcesar = async () => {
  if (!ocrPhotos.length) { toast('Agregá al menos una foto'); return; }
  document.getElementById('ocr-progress').style.display = 'block';
  document.getElementById('ocr-btn-process').style.display = 'none';

  let allText = '';
  for (const p of ocrPhotos) {
    try {
      const base64 = p.dataUrl.split(',')[1];
      const body = {
        requests: [{
          image: { content: base64 },
          features: [{ type: 'DOCUMENT_TEXT_DETECTION', maxResults: 1 }]
        }]
      };
      const resp = await fetch(
        `https://vision.googleapis.com/v1/images:annotate?key=${VISION_KEY}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
      );
      const data = await resp.json();
      const text = data.responses?.[0]?.fullTextAnnotation?.text || '';
      allText += text + '\n';
    } catch(e) {
      toast('Error procesando una foto — verificá conexión');
      document.getElementById('ocr-progress').style.display = 'none';
      document.getElementById('ocr-btn-process').style.display = 'block';
      return;
    }
  }

  document.getElementById('ocr-progress').style.display = 'none';
  ocrResultados = parseOCRText(allText);

  if (!ocrResultados.length) {
    toast('No se pudieron leer datos — intentá con mejor foto');
    document.getElementById('ocr-btn-process').style.display = 'block';
    return;
  }

  renderOCRPreview();
};

function parseOCRText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const results = [];
  const seenBags = new Set();

  // ─── Detectar total de referencia (número grande, ej: 1778000) ───
  // Buscamos el número más grande que aparezca en el texto (>= 6 dígitos)
  let detectedTotal = 0;
  const bigNums = [...text.matchAll(/\b(\d{6,10})\b/g)].map(m=>parseInt(m[1]));
  if (bigNums.length) detectedTotal = Math.max(...bigNums);

  for (const line of lines) {
    const m = line.match(/^(\d{1,3})\s+(.+)/);
    if (!m) continue;
    const bag = parseInt(m[1]);
    if (bag < 1 || bag > 200) continue;
    if (seenBags.has(bag)) continue;

    const rest = m[2];

    // Extraer precio — número grande al final (ej: 44000, 46000)
    const priceMatch = rest.match(/(\d{4,7})\s*$/);
    const price = priceMatch ? parseInt(priceMatch[1]) : 0;

    // Extraer código de medicamento (ej: CO80, CO120, AM1-CO80)
    const codeMatch = rest.match(/([A-Z]{1,4}\d{1,3}(?:-[A-Z]{1,4}\d{1,3})?)/);
    const code = codeMatch ? codeMatch[1] : '';

    // El nombre es lo que queda antes del código/precio
    let name = rest;
    if (code) name = name.replace(code, '');
    if (priceMatch) name = name.replace(priceMatch[0], '');
    name = name.replace(/\s{2,}/g, ' ').trim();
    name = name.replace(/[^a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s]/g, '').trim();

    if (name.length < 3) continue;

    seenBags.add(bag);
    results.push({ bag, name, price, code, note: '' });
  }

  // Guardar el total detectado para mostrarlo en la preview
  parseOCRText._lastTotal = detectedTotal;

  return results.sort((a, b) => a.bag - b.bag);
}

function renderOCRPreview() {
  const wrap = document.getElementById('ocr-preview-wrap');
  const container = document.getElementById('ocr-rows-container');
  if (!wrap || !container) return;

  const detectedTotal = parseOCRText._lastTotal || 0;

  // Campo de total de referencia arriba de todo
  const totalHtml = `
    <div style="background:var(--amber-bg);border:1px solid rgba(245,200,66,0.25);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;">
      <div style="font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">
        📋 Total de referencia de la planilla
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input class="finput" id="ocr-ref-total" type="number" style="margin:0;flex:1;"
          value="${detectedTotal||''}"
          placeholder="Ingresá el total impreso en la planilla..."/>
        ${detectedTotal?`<span style="font-size:11px;color:var(--amber);white-space:nowrap;">🔍 detectado</span>`:`<span style="font-size:11px;color:var(--text3);white-space:nowrap;">no detectado</span>`}
      </div>
      ${detectedTotal?`<div style="font-size:11px;color:var(--text2);margin-top:4px;">Verificá que sea correcto antes de confirmar.</div>`:'<div style="font-size:11px;color:var(--text3);margin-top:4px;">El OCR no lo encontró — escribilo manualmente.</div>'}
    </div>`;

  container.innerHTML = totalHtml + ocrResultados.map((r, i) => `
    <div style="background:var(--card2);border-radius:var(--radius-sm);padding:10px;margin-bottom:7px;">
      <div style="display:flex;gap:6px;margin-bottom:6px;">
        <input class="finput" style="margin:0;width:58px;flex-shrink:0;" type="number" value="${r.bag}" placeholder="#" oninput="ocrUpdate(${i},'bag',this.value)"/>
        <input class="finput" style="margin:0;flex:1;" value="${r.name}" placeholder="Nombre" oninput="ocrUpdate(${i},'name',this.value)"/>
      </div>
      <div style="display:flex;gap:6px;">
        <input class="finput" style="margin:0;flex:1;" type="number" value="${r.price||''}" placeholder="$ Precio" oninput="ocrUpdate(${i},'price',this.value)"/>
        <input class="finput" style="margin:0;width:90px;" value="${r.code||''}" placeholder="Cód." oninput="ocrUpdate(${i},'code',this.value)"/>
        <button onclick="ocrDeleteRow(${i})" style="background:var(--red-bg);border:none;border-radius:var(--radius-sm);color:var(--red);padding:0 10px;cursor:pointer;font-size:16px;">✕</button>
      </div>
    </div>`
  ).join('');

  container.innerHTML += `<button class="btn-add" onclick="ocrAgregarFila()" style="margin-top:4px;">+ Agregar fila manualmente</button>`;

  wrap.style.display = 'block';
  wrap.scrollIntoView({ behavior: 'smooth' });
}

    .card{background:#1a3d2e;border-radius:10px;padding:14px 18px;min-width:140px;}
    .card-lbl{font-size:10px;color:#4a7a5e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
    .card-val{font-size:20px;font-weight:700;color:#e8f5ee;font-family:monospace;}
    .card-val.green{color:#2ecc8a;} .card-val.red{color:#ff6b6b;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:8px 10px;font-size:10px;color:#4a7a5e;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #1a3d2e;}
    td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);}
    .sec-title{font-size:11px;font-weight:700;color:#4a7a5e;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px;padding-left:2px;}
    @media print{body{background:#fff;color:#111;} .card{background:#f5f5f5;} th,td{color:#111;} h1{color:#1a7a4a;}}
  </style></head><body>
  <h1>💊 ${mes}</h1>
  <div class="sub">Generado el ${new Date().toLocaleDateString('es-AR')} · ${all.length} pacientes</div>
  <div class="cards">
    <div class="card"><div class="card-lbl">Cobrado</div><div class="card-val green">${peso(t.totalCob)}</div></div>
    <div class="card"><div class="card-lbl">Esperado</div><div class="card-val">${peso(t.totalEsp)}</div></div>
    <div class="card"><div class="card-lbl">Pendiente</div><div class="card-val red">${peso(t.pendAmt)}</div></div>
    <div class="card"><div class="card-lbl">Efectivo</div><div class="card-val">${peso(t.cash)}</div></div>
    <div class="card"><div class="card-lbl">${state.settings.accA||'Cta A'}</div><div class="card-val">${peso(t.ta)}</div></div>
    <div class="card"><div class="card-lbl">${state.settings.accB||'Cta B'}</div><div class="card-val">${peso(t.tb)}</div></div>
    <div class="card"><div class="card-lbl">${state.settings.accC||'Cta C'}</div><div class="card-val">${peso(t.tc)}</div></div>
  </div>
  ${pending.length?`<div class="sec-title">⏳ Pendientes · ${pending.length}</div>
  <table><thead><tr><th>#</th><th>Paciente</th><th>Código</th><th>Precio</th><th>Estado</th><th>Nota</th></tr></thead>
  <tbody>${rowsPending}</tbody></table>`:''}
  ${done.length?`<div class="sec-title">✅ Retirados · ${done.length}</div>
  <table><thead><tr><th>#</th><th>Paciente</th><th>Código</th><th>Precio</th><th>Canal</th><th>Fecha / Nota</th></tr></thead>
  <tbody>${rowsDone}</tbody></table>`:''}
  <script>window.onload=()=>window.print()<\/script>
  </body></html>`;

  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if (!win) toast('Habilitá popups para exportar el PDF');
};

// ─── TOAST ────────────────────────────────────────────────────────────────────
window.toast = msg => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
};
</script>
</body>
</html>
